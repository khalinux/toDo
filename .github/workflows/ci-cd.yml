# ===================================================
# .github/workflows/ci-cd.yml
#
# 파이프라인 흐름:
#   git push main
#     → ① 테스트 (pytest)
#     → ② Docker 이미지 빌드 & Docker Hub Push
#     → ③ AWS EC2 자동 배포 (SSH)
#
# 필요한 GitHub Secrets:
#   DOCKER_USERNAME  - Docker Hub 계정 ID
#   DOCKER_TOKEN     - Docker Hub Access Token
#   EC2_HOST         - EC2 퍼블릭 IP
#   EC2_USER         - EC2 접속 계정 (보통 ubuntu)
#   EC2_KEY          - EC2 SSH Private Key (.pem 파일 내용)
# ===================================================

name: Todo App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop]

jobs:
  # ══════════════════════════════════════════════
  #  Job 1: 테스트
  # ══════════════════════════════════════════════
  test:
    name: 단위 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 캐시 (빌드 속도 향상)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt

      - name: pytest 실행
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ══════════════════════════════════════════════
  #  Job 2: Docker 이미지 빌드 & Push
  # ══════════════════════════════════════════════
  build-and-push:
    name: Docker 이미지 빌드 및 Push
    runs-on: ubuntu-latest
    needs: test                    # test Job 성공 후 실행

    # main 브랜치 push 시에만 실행 (PR은 테스트만)
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 메타데이터 설정
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/todo-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 이미지 빌드 및 Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════
  #  Job 3: EC2 자동 배포
  # ══════════════════════════════════════════════
  deploy:
    name: AWS EC2 배포
    runs-on: ubuntu-latest
    needs: build-and-push          # 이미지 Push 후 실행

    steps:
      - name: EC2 SSH 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 최신 이미지 Pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

            # 기존 컨테이너 중지·삭제 (없어도 에러 무시)
            docker stop todo-app || true
            docker rm   todo-app || true

            # 새 컨테이너 실행
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DATABASE_URL="sqlite:////app/todos.db" \
              ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

            # 배포 확인
            sleep 3
            docker ps | grep todo-app
            curl -sf http://localhost:8000/health || exit 1
            echo "✅ 배포 성공!"
