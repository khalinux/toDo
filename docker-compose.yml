# ===================================================
# docker-compose.yml
# 전체 실행: docker-compose up -d
# 전체 중지: docker-compose down
# 로그 확인: docker-compose logs -f
# ===================================================

version: "3.8"

services:

  # ── 백엔드 (FastAPI) ──────────────────────────────
  backend:
    build: ./backend          # backend/Dockerfile 로 빌드
    container_name: todo-backend
    ports:
      - "8000:8000"           # 호스트:컨테이너
    environment:
      - DATABASE_URL=postgresql://todouser:secret@db:5432/tododb
      - SECRET_KEY=dev-only-change-in-production
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy   # DB 헬스체크 통과 후 시작
    restart: unless-stopped

  # ── 데이터베이스 (PostgreSQL) ──────────────────────
  db:
    image: postgres:15
    container_name: todo-db
    environment:
      - POSTGRES_USER=todouser
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=tododb
    ports:
      - "5432:5432"           # 로컬에서 DB 직접 접속 가능
    volumes:
      - pgdata:/var/lib/postgresql/data   # 컨테이너 재시작 시 데이터 유지
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 5

# ── 볼륨 선언 ─────────────────────────────────────
volumes:
  pgdata:
    name: todo-pgdata
